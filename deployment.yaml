apiVersion: apps/v1
kind: Deployment
metadata:
  name: mon-site-web
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: mon-site-web
  template:
    metadata:
      labels:
        app: mon-site-web
    spec:
      containers:
        - name: site-web
          image: clemsc75/mon-site-rpi:v1
          ports:
            - containerPort: 80
          resources:
            limits:
              memory: "128Mi"
              cpu: "200m"
